name: F1 Livetiming Probe

on:
  push:
    paths:
      - '.github/workflows/f1-livetiming-probe.yml'
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Probe F1 livetiming static endpoints from GH runner
        run: |
          probe() {
            local label="$1"; local url="$2"
            local code size
            code=$(curl -sS -A "Mozilla/5.0" -o /tmp/out.bin \
              -w "%{http_code} %{size_download}" --max-time 30 "$url" || echo "ERR ERR")
            echo "| $label | $code |" >> "$GITHUB_STEP_SUMMARY"
          }
          {
            echo "## F1 livetiming probe — from GH Actions runner"
            echo "Runner public IP: $(curl -sS --max-time 10 https://ifconfig.me || echo unknown)"
            echo ""
            echo "| Endpoint | http_code size_bytes |"
            echo "|---|---|"
          } >> "$GITHUB_STEP_SUMMARY"

          probe "season Index.json (2024)" "https://livetiming.formula1.com/static/2024/Index.json"
          probe "session Index.json (Monaco 2024 Q)" "https://livetiming.formula1.com/static/2024/2024-05-26_Monaco_Grand_Prix/2024-05-25_Qualifying/Index.json"
          probe "CarData.z.jsonStream (Monaco 2024 Q)" "https://livetiming.formula1.com/static/2024/2024-05-26_Monaco_Grand_Prix/2024-05-25_Qualifying/CarData.z.jsonStream"
          probe "Position.z.jsonStream (Monaco 2024 Q)" "https://livetiming.formula1.com/static/2024/2024-05-26_Monaco_Grand_Prix/2024-05-25_Qualifying/Position.z.jsonStream"
          probe "DriverList.json (Monaco 2024 Q)" "https://livetiming.formula1.com/static/2024/2024-05-26_Monaco_Grand_Prix/2024-05-25_Qualifying/DriverList.json"
          probe "season Index.json (2026, current)" "https://livetiming.formula1.com/static/2026/Index.json"
