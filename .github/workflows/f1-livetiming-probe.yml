name: F1 Livetiming Probe

on:
  push:
    paths:
      - '.github/workflows/f1-livetiming-probe.yml'
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Probe F1 livetiming static endpoints from GH runner
        run: |
          set -x
          echo "=== runner IP geolocation hint ==="
          curl -sS --max-time 10 https://ifconfig.me || true
          echo
          echo "=== probe 1: season index (Index.json for 2024) ==="
          curl -sS -A "Mozilla/5.0" -o /tmp/idx.json \
            -w "HTTP=%{http_code}\nSIZE=%{size_download}\nTIME=%{time_total}s\n" \
            "https://livetiming.formula1.com/static/2024/Index.json"
          echo "first 300 bytes:"
          head -c 300 /tmp/idx.json || true
          echo
          echo "=== probe 2: session folder index (Monaco 2024 Q) ==="
          curl -sS -A "Mozilla/5.0" -o /tmp/sess.json \
            -w "HTTP=%{http_code}\nSIZE=%{size_download}\nTIME=%{time_total}s\n" \
            "https://livetiming.formula1.com/static/2024/2024-05-26_Monaco_Grand_Prix/2024-05-25_Qualifying/Index.json"
          head -c 300 /tmp/sess.json || true
          echo
          echo "=== probe 3: heavy data file (CarData.z.jsonStream Monaco Q 2024) ==="
          curl -sS -A "Mozilla/5.0" -o /tmp/cd.bin \
            -w "HTTP=%{http_code}\nSIZE=%{size_download}\nTIME=%{time_total}s\n" \
            "https://livetiming.formula1.com/static/2024/2024-05-26_Monaco_Grand_Prix/2024-05-25_Qualifying/CarData.z.jsonStream"
          echo "first 200 bytes (likely zlib chunks):"
          head -c 200 /tmp/cd.bin | xxd | head -10 || true
          echo
          echo "=== probe 4: Position.z.jsonStream Monaco Q 2024 ==="
          curl -sS -A "Mozilla/5.0" -o /tmp/pos.bin \
            -w "HTTP=%{http_code}\nSIZE=%{size_download}\nTIME=%{time_total}s\n" \
            "https://livetiming.formula1.com/static/2024/2024-05-26_Monaco_Grand_Prix/2024-05-25_Qualifying/Position.z.jsonStream"
          echo
          echo "=== probe 5: DriverList.json ==="
          curl -sS -A "Mozilla/5.0" -o /tmp/drv.json \
            -w "HTTP=%{http_code}\nSIZE=%{size_download}\nTIME=%{time_total}s\n" \
            "https://livetiming.formula1.com/static/2024/2024-05-26_Monaco_Grand_Prix/2024-05-25_Qualifying/DriverList.json"
          head -c 300 /tmp/drv.json || true
          echo
          echo "=== conclusion ==="
          echo "If all five probes returned HTTP=200 with non-trivial SIZE, livetiming.formula1.com is open from this runner."
