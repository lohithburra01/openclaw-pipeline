name: F1 Livetiming Probe

on:
  push:
    paths:
      - '.github/workflows/f1-livetiming-probe.yml'
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 'runner public IP'
        run: curl -sS --max-time 10 https://ifconfig.me && echo

      - name: 'probe 200 season 2024 Index'
        run: |
          code=$(curl -sS -A "Mozilla/5.0" -o /dev/null -w "%{http_code}" --max-time 30 \
            "https://livetiming.formula1.com/static/2024/Index.json")
          echo "got $code"; [ "$code" = "200" ]

      - name: 'probe 200 Monaco-2024-Q session Index'
        run: |
          code=$(curl -sS -A "Mozilla/5.0" -o /dev/null -w "%{http_code}" --max-time 30 \
            "https://livetiming.formula1.com/static/2024/2024-05-26_Monaco_Grand_Prix/2024-05-25_Qualifying/Index.json")
          echo "got $code"; [ "$code" = "200" ]

      - name: 'probe 200 Monaco-2024-Q CarData (telemetry)'
        run: |
          code=$(curl -sS -A "Mozilla/5.0" -o /dev/null -w "%{http_code}" --max-time 60 \
            "https://livetiming.formula1.com/static/2024/2024-05-26_Monaco_Grand_Prix/2024-05-25_Qualifying/CarData.z.jsonStream")
          echo "got $code"; [ "$code" = "200" ]

      - name: 'probe 200 Monaco-2024-Q Position (track xy)'
        run: |
          code=$(curl -sS -A "Mozilla/5.0" -o /dev/null -w "%{http_code}" --max-time 60 \
            "https://livetiming.formula1.com/static/2024/2024-05-26_Monaco_Grand_Prix/2024-05-25_Qualifying/Position.z.jsonStream")
          echo "got $code"; [ "$code" = "200" ]

      - name: 'probe 200 Monaco-2024-Q DriverList'
        run: |
          code=$(curl -sS -A "Mozilla/5.0" -o /dev/null -w "%{http_code}" --max-time 30 \
            "https://livetiming.formula1.com/static/2024/2024-05-26_Monaco_Grand_Prix/2024-05-25_Qualifying/DriverList.json")
          echo "got $code"; [ "$code" = "200" ]

      - name: 'probe 200 season 2026 Index (current)'
        run: |
          code=$(curl -sS -A "Mozilla/5.0" -o /dev/null -w "%{http_code}" --max-time 30 \
            "https://livetiming.formula1.com/static/2026/Index.json")
          echo "got $code"; [ "$code" = "200" ]
