name: F1 Livetiming Probe

on:
  push:
    paths:
      - '.github/workflows/f1-livetiming-probe.yml'
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 'A static-endpoint warmup (sanity, expect 200)'
        continue-on-error: true
        run: |
          c=$(curl -sS -A "Mozilla/5.0" -o /dev/null -w "%{http_code}" --max-time 30 "https://livetiming.formula1.com/static/2024/Index.json")
          echo "code=$c"; [ "$c" = "200" ]

      - name: 'B install fastf1'
        run: pip install -q fastf1

      - name: 'C fastf1 import + version'
        continue-on-error: true
        run: |
          python -c "import fastf1; print('fastf1 version =', fastf1.__version__)"

      - name: 'D fastf1 load Monaco 2024 Q (lap data only)'
        continue-on-error: true
        run: |
          python -c "
          import fastf1
          fastf1.Cache.enable_cache('/tmp/ff1cache')
          s = fastf1.get_session(2024, 'Monaco', 'Q')
          s.load(telemetry=False, laps=True, weather=False, messages=False)
          print('laps rows:', len(s.laps))
          print('drivers:', sorted(set(s.laps['Driver'])))
          "

      - name: 'E fastf1 load Monaco 2024 Q WITH telemetry'
        continue-on-error: true
        run: |
          python -c "
          import fastf1
          fastf1.Cache.enable_cache('/tmp/ff1cache')
          s = fastf1.get_session(2024, 'Monaco', 'Q')
          s.load(telemetry=True, laps=True, weather=False, messages=False)
          fastest = s.laps.pick_fastest()
          print('pole:', fastest['Driver'], fastest['LapTime'])
          tel = fastest.get_telemetry()
          print('telemetry samples:', len(tel))
          print('cols:', list(tel.columns)[:10])
          print('first row Distance/Speed/X/Y:', tel.iloc[0][['Distance','Speed','X','Y']].to_dict())
          "

      - name: 'F fastf1 list 2026 schedule'
        continue-on-error: true
        run: |
          python -c "
          import fastf1
          fastf1.Cache.enable_cache('/tmp/ff1cache')
          sch = fastf1.get_event_schedule(2026)
          print('events:', len(sch))
          # print the next event after today
          import pandas as pd
          from datetime import datetime
          now = pd.Timestamp.utcnow().tz_convert(None) if pd.Timestamp.utcnow().tzinfo else pd.Timestamp.utcnow()
          upcoming = sch[sch['EventDate'] >= now].head(3)
          for _, row in upcoming.iterrows():
              print('  ', row['EventDate'].strftime('%Y-%m-%d'), row['EventName'])
          "

      - name: 'G fastf1 load current Montreal 2026 Q (this weekends quali)'
        continue-on-error: true
        run: |
          python -c "
          import fastf1
          fastf1.Cache.enable_cache('/tmp/ff1cache')
          s = fastf1.get_session(2026, 'Canadian Grand Prix', 'Q')
          s.load(telemetry=False, laps=True, weather=False, messages=False)
          print('laps rows:', len(s.laps))
          print('fastest:', s.laps.pick_fastest()['Driver'], s.laps.pick_fastest()['LapTime'])
          "
