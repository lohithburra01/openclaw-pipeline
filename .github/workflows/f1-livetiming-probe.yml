name: F1 Livetiming Probe

on:
  push:
    paths:
      - '.github/workflows/f1-livetiming-probe.yml'
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: 'A season-2024 Index'
        continue-on-error: true
        run: |
          c=$(curl -sS -A "Mozilla/5.0" -o /dev/null -w "%{http_code}" --max-time 30 "https://livetiming.formula1.com/static/2024/Index.json")
          echo "code=$c"; [ "$c" = "200" ]

      - name: 'B session-Index Monaco-2024-Q'
        continue-on-error: true
        run: |
          c=$(curl -sS -A "Mozilla/5.0" -o /dev/null -w "%{http_code}" --max-time 30 "https://livetiming.formula1.com/static/2024/2024-05-26_Monaco_Grand_Prix/2024-05-25_Qualifying/Index.json")
          echo "code=$c"; [ "$c" = "200" ]

      - name: 'C DriverList Monaco-2024-Q'
        continue-on-error: true
        run: |
          c=$(curl -sS -A "Mozilla/5.0" -o /dev/null -w "%{http_code}" --max-time 30 "https://livetiming.formula1.com/static/2024/2024-05-26_Monaco_Grand_Prix/2024-05-25_Qualifying/DriverList.json")
          echo "code=$c"; [ "$c" = "200" ]

      - name: 'D TimingData Monaco-2024-Q'
        continue-on-error: true
        run: |
          c=$(curl -sS -A "Mozilla/5.0" -o /dev/null -w "%{http_code}" --max-time 60 "https://livetiming.formula1.com/static/2024/2024-05-26_Monaco_Grand_Prix/2024-05-25_Qualifying/TimingData.jsonStream")
          echo "code=$c"; [ "$c" = "200" ]

      - name: 'E CarData-HEAVY Monaco-2024-Q (3.4MB telemetry)'
        continue-on-error: true
        run: |
          c=$(curl -sS -A "Mozilla/5.0" -o /tmp/cd.bin -w "%{http_code}_bytes=%{size_download}" --max-time 90 "https://livetiming.formula1.com/static/2024/2024-05-26_Monaco_Grand_Prix/2024-05-25_Qualifying/CarData.z.jsonStream")
          echo "result=$c"
          echo "$c" | grep -q "^200"

      - name: 'F Position-HEAVY Monaco-2024-Q (3.5MB xy)'
        continue-on-error: true
        run: |
          c=$(curl -sS -A "Mozilla/5.0" -o /tmp/pos.bin -w "%{http_code}_bytes=%{size_download}" --max-time 90 "https://livetiming.formula1.com/static/2024/2024-05-26_Monaco_Grand_Prix/2024-05-25_Qualifying/Position.z.jsonStream")
          echo "result=$c"
          echo "$c" | grep -q "^200"

      - name: 'G season-2026 Index (current season)'
        continue-on-error: true
        run: |
          c=$(curl -sS -A "Mozilla/5.0" -o /tmp/idx26.json -w "%{http_code}_bytes=%{size_download}" --max-time 30 "https://livetiming.formula1.com/static/2026/Index.json")
          echo "result=$c"
          echo "$c" | grep -q "^200"
