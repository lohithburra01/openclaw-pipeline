name: F1 Livetiming Probe

on:
  push:
    paths:
      - '.github/workflows/f1-livetiming-probe.yml'
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 'PASS-if-200 minimal-UA'
        continue-on-error: true
        run: |
          c=$(curl -sS -A "Mozilla/5.0" -o /dev/null -w "%{http_code}" --max-time 30 \
            "https://livetiming.formula1.com/static/2024/Index.json"); echo "code=$c"; [ "$c" = "200" ]

      - name: 'PASS-if-200 browser-headers'
        continue-on-error: true
        run: |
          c=$(curl -sS \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
            -H "Accept: */*" -H "Accept-Language: en-US,en;q=0.9" \
            -H "Referer: https://www.formula1.com/" \
            -o /dev/null -w "%{http_code}" --max-time 30 \
            "https://livetiming.formula1.com/static/2024/Index.json"); echo "code=$c"; [ "$c" = "200" ]

      - name: 'PASS-if-200 no-UA'
        continue-on-error: true
        run: |
          c=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 30 \
            "https://livetiming.formula1.com/static/2024/Index.json"); echo "code=$c"; [ "$c" = "200" ]

      - name: 'PASS-if-200 curl-default-UA'
        continue-on-error: true
        run: |
          c=$(curl -sS -H "User-Agent: curl/8.0" -o /dev/null -w "%{http_code}" --max-time 30 \
            "https://livetiming.formula1.com/static/2024/Index.json"); echo "code=$c"; [ "$c" = "200" ]

      - name: 'PASS-if-200 fastf1-UA'
        continue-on-error: true
        run: |
          c=$(curl -sS -H "User-Agent: fastf1" -o /dev/null -w "%{http_code}" --max-time 30 \
            "https://livetiming.formula1.com/static/2024/Index.json"); echo "code=$c"; [ "$c" = "200" ]

      - name: 'PASS-if-redirect-or-200 root'
        continue-on-error: true
        run: |
          c=$(curl -sS -A "Mozilla/5.0" -o /dev/null -w "%{http_code}" --max-time 30 \
            "https://livetiming.formula1.com/"); echo "code=$c"; [ "$c" = "200" ] || [ "$c" = "301" ] || [ "$c" = "302" ]

      - name: 'commit results so we can read them back'
        if: always()
        run: |
          mkdir -p _probe
          {
            echo "# F1 livetiming probe results (run ${{ github.run_id }})"
            echo "Runner IP: $(curl -sS --max-time 10 https://ifconfig.me)"
            echo ""
            for label in minimal browser none curldefault fastfua root; do
              true # placeholder so the step has content; the actual codes are encoded in prior step conclusions
            done
          } > _probe/results.txt
          echo "(see step conclusions above)" >> _probe/results.txt
