name: F1 Render Pipeline

on:
  workflow_dispatch:
    inputs:
      config:
        description: 'JSON job config (paste entire config.json contents)'
        required: false
        default: ''
  push:
    paths:
      - 'config.json'

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-f1pipeline
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache FastF1
        uses: actions/cache@v4
        with:
          path: ~/.cache/fastf1
          key: ${{ runner.os }}-fastf1-${{ hashFiles('config.json') }}
          restore-keys: |
            ${{ runner.os }}-fastf1-

      - name: Install dependencies
        run: |
          pip install fastf1 opencv-python-headless pillow scipy numpy google-auth google-auth-httplib2 google-api-python-client -q

      - name: Write config if provided via workflow_dispatch
        if: ${{ github.event.inputs.config != '' }}
        run: |
          echo '${{ github.event.inputs.config }}' > config.json

      - name: Render video
        run: |
          python render.py --config config.json --output-dir output

      - name: Upload to Google Drive
        env:
          GDRIVE_REFRESH_TOKEN: ${{ secrets.GDRIVE_REFRESH_TOKEN }}
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          python - <<'PYEOF'
          import os
          from google.oauth2.credentials import Credentials
          from google.auth.transport.requests import Request
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          creds = Credentials(
              token=None,
              refresh_token=os.environ['GDRIVE_REFRESH_TOKEN'],
              client_id=os.environ['GDRIVE_CLIENT_ID'],
              client_secret=os.environ['GDRIVE_CLIENT_SECRET'],
              token_uri='https://oauth2.googleapis.com/token'
          )
          creds.refresh(Request())
          drive = build('drive', 'v3', credentials=creds)

          folder_id = os.environ['GDRIVE_FOLDER_ID']

          for fname in os.listdir('output'):
              if fname.endswith('.mp4'):
                  fpath = os.path.join('output', fname)
                  print(f"Uploading {fname}...")
                  metadata = {'name': fname, 'parents': [folder_id]}
                  media = MediaFileUpload(fpath, mimetype='video/mp4', resumable=True)
                  result = drive.files().create(
                      body=metadata,
                      media_body=media,
                      fields='id,name'
                  ).execute()
                  print(f"✅ Uploaded: {fname} (id: {result['id']})")
          PYEOF

      - name: Upload artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: f1-video
          path: output/*.mp4
          retention-days: 3
